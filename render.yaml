services:
  - type: web
    name: royal-steel-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python backend/startup.py && gunicorn royal_backend.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.3
      - key: DJANGO_SETTINGS_MODULE
        value: royal_backend.settings